name: Daily News Digest

on:
  schedule:
    # GitHub Actions は UTC 基準。6:00 JST = 21:00 UTC（前日）
    - cron: "0 21 * * *"
  workflow_dispatch: {} # 手動実行ボタンも有効化（テスト用）

# 履歴のコミット(contents)と Pages デプロイに必要な権限
permissions:
  contents: write
  pages: write
  id-token: write

# 同時実行を1本に絞る（デプロイの競合防止）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOP_N: "20" # 毎朝ここで指定した本数を選ぶ（変えたいときはこの数字だけ書き換える）
        run: npm start

      - name: Commit updated history
        # 履歴の保存は"おまけ"。ここが失敗（古いコミットでの再実行や競合）しても
        # サイトのデプロイは止めない。
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --staged --quiet; then
            echo "履歴に変更なし"
          else
            git commit -m "chore: update digest history ($(date -u +%Y-%m-%d))"
            # 実行中に main が進んでいても取りこぼさないよう rebase してから push
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
